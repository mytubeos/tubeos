<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snowie Dash 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0A001E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    font-family: 'Fredoka One', cursive;
  }
  .gtitle {
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: #FFB5C8;
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-shadow: 0 0 25px rgba(255,181,200,0.7);
  }
  canvas {
    display: block;
    max-width: 100vw;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 0 50px rgba(190,80,255,0.4), 0 0 100px rgba(190,80,255,0.15);
  }
  .hint {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    color: rgba(190,140,255,0.55);
    margin-top: 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="gtitle">🐱 SNOWIE DASH 🐱</div>
<canvas id="c"></canvas>
<div class="hint">SPACE / TAP = Jump &nbsp;•&nbsp; Double Jump available! &nbsp;•&nbsp; Collect fish &amp; stars!</div>

<script>
'use strict';

// ── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 390;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, (window.innerHeight - 90) / H, 1.3);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── AUDIO ───────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function tone(freq, type, dur, vol, endFreq, delay = 0) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.connect(g); g.connect(AC.destination);
    const t = AC.currentTime + delay;
    o.frequency.setValueAtTime(freq, t);
    if (endFreq) o.frequency.exponentialRampToValueAtTime(endFreq, t + dur * 0.8);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}

const SFX = {
  jump:    () => tone(360,'sine',0.13,0.25,750),
  djump:   () => { tone(500,'sine',0.08,0.22,950); tone(750,'sine',0.08,0.18,1300,0.05); },
  collect: () => tone(660,'sine',0.12,0.2,900),
  star:    () => [523,659,784,1047].forEach((f,i) => tone(f,'sine',0.1,0.18,null,i*0.06)),
  heart:   () => { tone(523,'sine',0.1,0.3); tone(784,'sine',0.1,0.3,null,0.12); tone(1047,'sine',0.14,0.28,null,0.24); },
  hit:     () => tone(180,'sawtooth',0.35,0.4,55),
  over:    () => [400,310,240,170].forEach((f,i) => tone(f,'sawtooth',0.2,0.3,null,i*0.16)),
  combo:   () => [523,659,784,1047,1318].forEach((f,i) => tone(f,'sine',0.09,0.2,null,i*0.05)),
};

// ── PARTICLES ───────────────────────────────────────────────────────────────
const PARTICLES = [];

function burst(x, y, color, n = 9, spread = 3.5) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spread * (0.4 + Math.random());
    PARTICLES.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.8,
      life: 1, decay: 0.024 + Math.random() * 0.02,
      r: 2.5 + Math.random() * 4.5, color
    });
  }
}

function updatePFX() {
  for (let i = PARTICLES.length - 1; i >= 0; i--) {
    const p = PARTICLES[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.13;
    p.life -= p.decay;
    if (p.life <= 0) PARTICLES.splice(i, 1);
  }
}
function drawPFX() {
  PARTICLES.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life * 0.88;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

// ── FLOATING TEXTS ──────────────────────────────────────────────────────────
const FLOATS = [];
function floatText(text, x, y, color = '#FFE040', size = 18) {
  FLOATS.push({ text, x, y, life: 1, color, size });
}
function updateFloats() {
  for (let i = FLOATS.length - 1; i >= 0; i--) {
    FLOATS[i].y -= 1.3; FLOATS[i].life -= 0.022;
    if (FLOATS[i].life <= 0) FLOATS.splice(i, 1);
  }
}
function drawFloats() {
  ctx.save();
  ctx.textAlign = 'center';
  FLOATS.forEach(f => {
    ctx.globalAlpha = f.life;
    ctx.font = `bold ${f.size}px 'Fredoka One', cursive`;
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color; ctx.shadowBlur = 8;
    ctx.fillText(f.text, f.x, f.y);
    ctx.shadowBlur = 0;
  });
  ctx.restore();
}

// ── CONSTANTS ───────────────────────────────────────────────────────────────
const GY = 300;          // ground y-line
const CAT_X = 115;       // cat fixed x
const CAT_FLOOR = GY - 54; // cat y when on ground

// ── DRAW: CAT ───────────────────────────────────────────────────────────────
function drawCat(cx, cy, catSt, frame, invTimer, tick) {
  ctx.save();
  if (invTimer > 0 && Math.floor(invTimer / 4) % 2 === 0) { ctx.restore(); return; }
  if (invTimer > 0) { ctx.shadowColor = '#C9B8FF'; ctx.shadowBlur = 22; }

  ctx.translate(cx, cy);

  // LEG OFFSETS
  let fl1=0, fl2=0, bl1=0, bl2=0;
  if (catSt === 'run') {
    const lf = Math.floor(tick / 5) % 2;
    fl1 = lf ? 8 : -8; fl2 = -fl1;
    bl1 = lf ? -6 : 6; bl2 = -bl1;
  } else if (catSt === 'jump' || catSt === 'djump') {
    fl1 = fl2 = -9; bl1 = bl2 = 9;
  }

  // TAIL
  const tw = Math.sin(tick * 0.12) * 28 * (Math.PI / 180);
  ctx.save();
  ctx.translate(-22, -8); ctx.rotate(tw);
  ctx.fillStyle = '#F8CADB';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-12,-8,-20,-24,-9,-34);
  ctx.bezierCurveTo(-4,-40,5,-35,4,-28);
  ctx.bezierCurveTo(-3,-22,-6,-12,4,-2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFB5C8';
  ctx.beginPath(); ctx.arc(-9,-34,5.5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // BACK LEGS
  ctx.fillStyle = '#F0B0C8';
  ctx.beginPath(); ctx.ellipse(-13, 9+bl1, 6.5, 11, 0.25,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-5,  9+bl2, 6.5, 11,-0.2, 0,Math.PI*2); ctx.fill();

  // BODY
  ctx.fillStyle = '#F8CADB';
  ctx.beginPath(); ctx.ellipse(1, -5, 27, 19, 0, 0, Math.PI*2); ctx.fill();
  // Belly
  ctx.fillStyle = '#FFF0F8';
  ctx.beginPath(); ctx.ellipse(3, -3, 14, 11, 0, 0, Math.PI*2); ctx.fill();

  // FRONT LEGS
  ctx.fillStyle = '#F8CADB';
  ctx.beginPath(); ctx.ellipse(17, 6+fl1, 6.5, 11,-0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(24, 6+fl2, 6.5, 11, 0.15,0,Math.PI*2); ctx.fill();

  // HEAD
  ctx.fillStyle = '#F8CADB';
  ctx.beginPath(); ctx.arc(24, -22, 19, 0, Math.PI*2); ctx.fill();

  // LEFT EAR
  ctx.fillStyle = '#F8CADB';
  ctx.beginPath(); ctx.moveTo(10,-34); ctx.lineTo(14,-50); ctx.lineTo(24,-38); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFD6E8';
  ctx.beginPath(); ctx.moveTo(12,-36); ctx.lineTo(14,-46); ctx.lineTo(21,-39); ctx.closePath(); ctx.fill();
  // RIGHT EAR
  ctx.fillStyle = '#F8CADB';
  ctx.beginPath(); ctx.moveTo(24,-38); ctx.lineTo(34,-50); ctx.lineTo(38,-34); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFD6E8';
  ctx.beginPath(); ctx.moveTo(25,-39); ctx.lineTo(34,-46); ctx.lineTo(36,-36); ctx.closePath(); ctx.fill();

  // EYES
  const blink = (tick % 220 < 6) || catSt === 'dead';
  const wide  = catSt === 'jump' || catSt === 'djump';

  if (blink) {
    ctx.strokeStyle = '#8A5A7A'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(16,-23,5.5,0.15,Math.PI-0.15); ctx.stroke();
    ctx.beginPath(); ctx.arc(31,-23,5.5,0.15,Math.PI-0.15); ctx.stroke();
  } else {
    const er = wide ? 7.5 : 6;
    ctx.fillStyle = wide ? '#3A1A50' : '#5A3D6B';
    ctx.beginPath(); ctx.arc(16,-23,er,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(31,-23,er,0,Math.PI*2); ctx.fill();
    // Highlights
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(18,-25,2.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(33,-25,2.8,0,Math.PI*2); ctx.fill();
    // Inner pupil
    if (!wide) {
      ctx.fillStyle = '#2A0F40';
      ctx.beginPath(); ctx.arc(15,-22,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(30,-22,3,0,Math.PI*2); ctx.fill();
    }
  }

  // NOSE
  ctx.fillStyle = '#FF9EB5';
  ctx.beginPath(); ctx.moveTo(24,-16); ctx.lineTo(20,-12); ctx.lineTo(28,-12); ctx.closePath(); ctx.fill();

  // MOUTH
  ctx.strokeStyle = '#E08090'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(24,-12); ctx.lineTo(24,-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(24,-10); ctx.bezierCurveTo(20,-10,18,-8,18,-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(24,-10); ctx.bezierCurveTo(28,-10,30,-8,30,-8); ctx.stroke();

  // WHISKERS
  ctx.strokeStyle = 'rgba(180,90,130,0.5)'; ctx.lineWidth = 1.3;
  for (let i = 0; i < 3; i++) {
    ctx.save(); ctx.translate(19, -16 + i * 3);
    ctx.rotate((-4 + i * 4) * Math.PI / 180 - 0.18);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-17,0); ctx.stroke();
    ctx.restore();
  }
  for (let i = 0; i < 3; i++) {
    ctx.save(); ctx.translate(29, -16 + i * 3);
    ctx.rotate((4 - i * 4) * Math.PI / 180 + 0.18);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(17,0); ctx.stroke();
    ctx.restore();
  }

  // BLUSH
  ctx.fillStyle = 'rgba(255,120,150,0.28)';
  ctx.beginPath(); ctx.ellipse(11,-18,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(37,-18,7,4,0,0,Math.PI*2); ctx.fill();

  // DOUBLE JUMP ring
  if (catSt === 'djump') {
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2 + tick*0.14;
      const d = 28 + Math.sin(tick*0.2)*5;
      ctx.fillStyle = `hsl(${(i*45+tick*4)%360},100%,72%)`;
      ctx.beginPath(); ctx.arc(24+Math.cos(a)*d, -10+Math.sin(a)*20, 3.5, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

// ── DRAW: DOG OBSTACLE ──────────────────────────────────────────────────────
function drawDog(x, y, tick) {
  ctx.save(); ctx.translate(x, y);
  const rf = Math.floor(tick / 4) % 2;
  const ls = rf ? 7 : -7;

  ctx.fillStyle = '#B8945A';
  ctx.beginPath(); ctx.ellipse(-11, 5+ls,  5.5,11, 0.25,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-3,  5-ls,  5.5,11,-0.1, 0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 7,  5-ls,  5.5,11, 0.1, 0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 15, 5+ls,  5.5,11,-0.25,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#C8A870';
  ctx.beginPath(); ctx.ellipse(2,-10,23,14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-20,-18,15,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#D8B880';
  ctx.beginPath(); ctx.ellipse(-28,-16,10,6.5,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#A87A48';
  ctx.beginPath(); ctx.ellipse(-29,-9,6.5,12,-0.45,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#3A1A0A';
  ctx.beginPath(); ctx.arc(-24,-22,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-23,-23,1.8,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#4A2A14';
  ctx.beginPath(); ctx.arc(-31,-18,3.2,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#6A3A18'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-32,-29); ctx.lineTo(-18,-25); ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  for (let i = 0; i < 3; i++) ctx.fillRect(-33+i*3.5, -13, 3, 5);

  const ta = Math.sin(tick * 0.22) * 28 * (Math.PI/180);
  ctx.save(); ctx.translate(23,-14); ctx.rotate(ta);
  ctx.fillStyle='#C8A870';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(9,-5,14,5,9,11); ctx.bezierCurveTo(5,13,0,8,0,0); ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ── DRAW: ROCK OBSTACLE ─────────────────────────────────────────────────────
function drawRock(x, y) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#6A7B92';
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(7,-40); ctx.lineTo(18,-52);
  ctx.lineTo(32,-46); ctx.lineTo(40,-30); ctx.lineTo(33,0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#8FA0B8';
  ctx.beginPath();
  ctx.moveTo(9,-5); ctx.lineTo(14,-42); ctx.lineTo(23,-46); ctx.lineTo(18,-5);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#505F70';
  ctx.beginPath();
  ctx.moveTo(30,-5); ctx.lineTo(33,-30); ctx.lineTo(40,-30); ctx.lineTo(33,0);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── DRAW: BIRD OBSTACLE ─────────────────────────────────────────────────────
function drawBird(x, y, tick) {
  ctx.save(); ctx.translate(x, y);
  const wf = Math.sin(tick * 0.24) * 24 * (Math.PI / 180);

  ctx.fillStyle = '#7B5FA0';
  ctx.beginPath(); ctx.ellipse(0,0,15,9,0.2,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#9B7FBF';
  ctx.save(); ctx.translate(-10,-2); ctx.rotate(-wf-0.45);
  ctx.beginPath(); ctx.ellipse(-11,0,16,5.5,0.4,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(10,-2); ctx.rotate(wf+0.45);
  ctx.beginPath(); ctx.ellipse(11,0,16,5.5,-0.4,0,Math.PI*2); ctx.fill(); ctx.restore();

  ctx.fillStyle = '#7B5FA0';
  ctx.beginPath(); ctx.arc(-16,-4,8.5,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#FFBE3C';
  ctx.beginPath(); ctx.moveTo(-24,-4); ctx.lineTo(-32,-3); ctx.lineTo(-24,-1); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(-18,-6,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1A0A0A';
  ctx.beginPath(); ctx.arc(-18,-6,2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── DRAW: FISH COLLECTIBLE ──────────────────────────────────────────────────
function drawFish(x, y, tick) {
  const bob = Math.sin(tick * 0.055) * 5;
  ctx.save(); ctx.translate(x, y + bob);

  const gl = ctx.createRadialGradient(0,0,3,0,0,22);
  gl.addColorStop(0,'rgba(70,190,255,0.4)'); gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#50C8FF';
  ctx.beginPath(); ctx.ellipse(0,0,13.5,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-13,0); ctx.lineTo(-23,-9); ctx.lineTo(-23,9); ctx.closePath(); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.ellipse(4,-2,5.5,3,-0.3,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle = 'rgba(20,140,220,0.4)'; ctx.lineWidth = 1.2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(-4+i*(-5),-8); ctx.lineTo(-4+i*(-5),8); ctx.stroke();
  }

  ctx.fillStyle = '#1A3050';
  ctx.beginPath(); ctx.arc(11,-1,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(12,-2,1.3,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── DRAW: STAR COLLECTIBLE ──────────────────────────────────────────────────
function drawStar(x, y, tick) {
  const bob = Math.sin(tick * 0.08 + 1.5) * 5;
  ctx.save(); ctx.translate(x, y + bob); ctx.rotate(tick * 0.016);

  const gl = ctx.createRadialGradient(0,0,3,0,0,24);
  gl.addColorStop(0,'rgba(255,230,70,0.55)'); gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2 - Math.PI/2, a2 = a + Math.PI/5;
    if (i===0) ctx.moveTo(Math.cos(a)*14, Math.sin(a)*14);
    else        ctx.lineTo(Math.cos(a)*14, Math.sin(a)*14);
    ctx.lineTo(Math.cos(a2)*5.5, Math.sin(a2)*5.5);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(-2,-3,4.5,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── DRAW: HEART COLLECTIBLE ─────────────────────────────────────────────────
function drawHeart(x, y, tick) {
  const bob   = Math.sin(tick * 0.07 + 3) * 5;
  const pulse = 1 + Math.sin(tick * 0.13) * 0.12;
  ctx.save(); ctx.translate(x, y + bob); ctx.scale(pulse, pulse);

  const gl = ctx.createRadialGradient(0,0,2,0,0,24);
  gl.addColorStop(0,'rgba(255,70,120,0.55)'); gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#FF3C7A';
  ctx.beginPath();
  ctx.moveTo(0,10);
  ctx.bezierCurveTo(-15,-1,-15,-16,0,-8);
  ctx.bezierCurveTo(15,-16,15,-1,0,10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.beginPath(); ctx.arc(-4,-5,4.5,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── BACKGROUND ASSETS ────────────────────────────────────────────────────────
const BG_STARS = Array.from({length:60}, () => ({
  x: Math.random()*W, y: Math.random()*H*0.65,
  r: Math.random()*1.9+0.4,
  phase: Math.random()*Math.PI*2
}));
const BG_CLOUDS = Array.from({length:5}, (_,i) => ({
  x: i*170+60, y: 22+Math.random()*55,
  w: 65+Math.random()*65, spd: 0.22+Math.random()*0.22
}));
const BG_TREES = Array.from({length:10}, (_,i) => ({
  x: i*90+Math.random()*40, h: 55+Math.random()*45, r: 19+Math.random()*13
}));

function drawBG(tick, spd) {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#08011A'); sky.addColorStop(0.42,'#280650');
  sky.addColorStop(0.76,'#621580'); sky.addColorStop(1,'#B04895');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Moon
  ctx.fillStyle = 'rgba(255,242,205,0.93)';
  ctx.beginPath(); ctx.arc(688,56,38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(170,140,255,0.2)';
  ctx.beginPath(); ctx.arc(703,50,38,0,Math.PI*2); ctx.fill();
  const mg = ctx.createRadialGradient(688,56,20,688,56,80);
  mg.addColorStop(0,'rgba(255,225,170,0.22)'); mg.addColorStop(1,'transparent');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(688,56,80,0,Math.PI*2); ctx.fill();

  // Stars
  BG_STARS.forEach(s => {
    const a = 0.35 + 0.65*Math.sin(s.phase + tick*0.022);
    ctx.fillStyle = `rgba(255,215,255,${a})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  // Clouds
  BG_CLOUDS.forEach(c => {
    c.x -= c.spd;
    if (c.x < -c.w-60) c.x = W+30;
    ctx.fillStyle = 'rgba(255,185,235,0.09)';
    ctx.beginPath();
    ctx.arc(c.x,          c.y,    c.w*0.38,0,Math.PI*2);
    ctx.arc(c.x+c.w*0.3,  c.y-13, c.w*0.3, 0,Math.PI*2);
    ctx.arc(c.x+c.w*0.6,  c.y,    c.w*0.33,0,Math.PI*2);
    ctx.fill();
  });

  // Trees (parallax)
  BG_TREES.forEach(t => {
    t.x -= spd * 0.27;
    if (t.x < -t.r*2.5) t.x = W + t.r;
    ctx.fillStyle = '#1C0440';
    ctx.fillRect(t.x-3.5, GY-t.h, 7, t.h);
    ctx.fillStyle = 'rgba(50,10,85,0.68)';
    ctx.beginPath(); ctx.arc(t.x, GY-t.h, t.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(90,20,130,0.38)';
    ctx.beginPath(); ctx.arc(t.x, GY-t.h-t.r*0.65, t.r*0.68, 0, Math.PI*2); ctx.fill();
  });

  // Ground
  const gr = ctx.createLinearGradient(0,GY,0,H);
  gr.addColorStop(0,'#350760'); gr.addColorStop(0.45,'#22044A'); gr.addColorStop(1,'#0E0125');
  ctx.fillStyle = gr; ctx.fillRect(0,GY,W,H-GY);

  // Glow line
  ctx.strokeStyle = 'rgba(188,74,255,0.55)'; ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(188,74,255,1)'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();
  ctx.shadowBlur = 0;

  // Ground scrolling dots
  for (let i = 0; i < 20; i++) {
    const gx = ((i*46 + tick*spd*0.5) % W);
    ctx.fillStyle = 'rgba(170,70,255,0.11)';
    ctx.beginPath(); ctx.arc(gx, GY+15, 3, 0, Math.PI*2); ctx.fill();
  }
}

// ── GAME STATE ──────────────────────────────────────────────────────────────
let highScore = 0;
let G = {};

function initGame() {
  PARTICLES.length = 0;
  FLOATS.length = 0;
  G = {
    state: 'menu',
    score: 0, lives: 3, combo: 0,
    tick: 0, frame: 0,
    speed: 4.6,
    obstacles: [], cols: [],
    nextObs: 110, nextCol: 75,
    shake: 0,
    cat: { y: CAT_FLOOR, vy: 0, state: 'run', jumps: 0, inv: 0 }
  };
}

function startGame() {
  initGame();
  G.state = 'playing';
}

// ── SPAWNING ─────────────────────────────────────────────────────────────────
function spawnObs() {
  const pool = G.speed < 7 ? ['dog','dog','rock'] : ['dog','rock','rock','bird'];
  const type = pool[Math.floor(Math.random() * pool.length)];
  if (type === 'bird') {
    G.obstacles.push({type, x:W+70, y:GY-90-Math.random()*30, w:38, h:30});
  } else if (type === 'dog') {
    G.obstacles.push({type, x:W+70, y:GY-38, w:44, h:38});
  } else {
    G.obstacles.push({type, x:W+70, y:GY-52, w:40, h:52});
  }
}

function spawnCol() {
  const r = Math.random();
  const type = r < 0.58 ? 'fish' : r < 0.88 ? 'star' : 'heart';
  const y = GY - 58 - Math.random()*80;
  G.cols.push({type, x: W+50, y});
}

// ── COLLISION ────────────────────────────────────────────────────────────────
function checkCollisions() {
  if (G.cat.inv > 0) return;
  const cx1 = CAT_X+4, cx2 = CAT_X+44;
  const cy1 = G.cat.y-42, cy2 = G.cat.y+5;

  for (const obs of G.obstacles) {
    if (cx2 > obs.x+7 && cx1 < obs.x+obs.w-7 &&
        cy2 > obs.y-obs.h+8 && cy1 < obs.y+5) {
      onHit(); return;
    }
  }
}

function checkPickups() {
  const cx = CAT_X + 24, cy = G.cat.y - 20;
  G.cols = G.cols.filter(col => {
    const dx = cx - col.x, dy = cy - col.y;
    if (Math.hypot(dx, dy) < 30) {
      G.combo++;
      const mult = Math.max(1, Math.ceil(G.combo / 3));
      let pts = 0;
      if (col.type === 'fish') {
        pts = 10 * mult;
        burst(col.x, col.y, '#50C8FF', 10);
        SFX.collect();
        floatText('+'+pts, col.x, col.y-12, '#7ECFFF');
      } else if (col.type === 'star') {
        pts = 50 * mult;
        burst(col.x, col.y, '#FFD700', 13);
        G.combo % 5 === 0 ? SFX.combo() : SFX.star();
        floatText('+'+pts+(G.combo>=5?' 🔥':''), col.x, col.y-12, '#FFE040', 20);
      } else {
        G.lives = Math.min(3, G.lives + 1);
        pts = 25;
        burst(col.x, col.y, '#FF3C7A', 14);
        SFX.heart();
        floatText('❤️ +LIFE!', col.x, col.y-12, '#FF6090', 20);
      }
      G.score += pts;
      return false;
    }
    return true;
  });
}

function onHit() {
  G.lives--;
  G.cat.inv = 140;
  G.shake = 20;
  G.combo = 0;
  burst(CAT_X+22, G.cat.y-18, '#FF4080', 14);
  SFX.hit();
  if (G.lives <= 0) {
    G.cat.state = 'dead';
    G.state = 'dead';
    SFX.over();
    if (G.score > highScore) highScore = G.score;
    setTimeout(() => { G.state = 'over'; }, 2200);
  }
}

// ── INPUT ────────────────────────────────────────────────────────────────────
function jump() {
  if (AC.state === 'suspended') AC.resume();
  if (G.state === 'menu' || G.state === 'over') { startGame(); return; }
  if (G.state === 'dead') return;

  const c = G.cat;
  if (c.jumps < 2) {
    const dj = c.jumps === 1;
    c.vy = dj ? -11 : -13.5;
    c.state = dj ? 'djump' : 'jump';
    c.jumps++;
    if (dj) { burst(CAT_X+22, c.y, '#C9B8FF', 13); SFX.djump(); }
    else SFX.jump();
  }
}
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

// ── UI ───────────────────────────────────────────────────────────────────────
function drawUI() {
  // Score
  ctx.save();
  ctx.textAlign = 'left';
  ctx.font = "bold 30px 'Fredoka One', cursive";
  ctx.fillStyle = 'white';
  ctx.shadowColor = 'rgba(190,80,255,0.9)'; ctx.shadowBlur = 14;
  ctx.fillText('⭐ ' + G.score, 18, 38);
  ctx.shadowBlur = 0;
  ctx.font = "16px 'Fredoka One', cursive";
  ctx.fillStyle = 'rgba(210,170,255,0.7)';
  ctx.fillText('BEST ' + highScore, 18, 60);
  ctx.restore();

  // Lives (right side)
  for (let i = 0; i < 3; i++) {
    ctx.save();
    ctx.globalAlpha = i < G.lives ? 1 : 0.2;
    ctx.font = '24px serif';
    ctx.textAlign = 'left';
    ctx.fillText('❤️', W - 40 - i*33, 38);
    ctx.restore();
  }

  // Level
  ctx.save();
  ctx.textAlign = 'right';
  ctx.font = "14px 'Fredoka One', cursive";
  ctx.fillStyle = 'rgba(190,140,255,0.7)';
  ctx.fillText('LV ' + (Math.floor((G.speed - 4.6) / 0.45) + 1), W-16, 60);
  ctx.restore();

  // Combo
  if (G.combo >= 3) {
    ctx.save();
    ctx.textAlign = 'center';
    const h = (G.tick * 5) % 360;
    ctx.font = "bold 22px 'Fredoka One', cursive";
    ctx.fillStyle = `hsl(${h},100%,72%)`;
    ctx.shadowColor = `hsl(${h},100%,55%)`; ctx.shadowBlur = 16;
    ctx.fillText(G.combo + 'x COMBO! 🔥', W/2, 44);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle = 'rgba(8,0,22,0.78)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';

  const h = (G.tick * 2) % 360;
  ctx.font = "bold 68px 'Fredoka One', cursive";
  ctx.fillStyle = `hsl(${h},80%,72%)`;
  ctx.shadowColor = `hsl(${h},100%,55%)`; ctx.shadowBlur = 32;
  ctx.fillText('SNOWIE DASH', W/2, 108);
  ctx.shadowBlur = 0;

  ctx.font = '58px serif';
  ctx.fillText('🐱', W/2, 172);

  ctx.font = "22px 'Fredoka One', cursive";
  ctx.fillStyle = '#FFBAD8';
  ctx.fillText('Made with 💕 for Koyelu', W/2, 215);


  const p = 0.6 + 0.4*Math.sin(G.tick * 0.07);
  ctx.save(); ctx.globalAlpha = p;
  ctx.font = "30px 'Fredoka One', cursive";
  ctx.fillStyle = '#FFB5C8';
  ctx.shadowColor = '#FF6090'; ctx.shadowBlur = 20;
  ctx.fillText('✦  TAP / SPACE TO START  ✦', W/2, 278);
  ctx.shadowBlur = 0; ctx.restore();

  ctx.font = "15px 'Nunito', sans-serif";
  ctx.fillStyle = 'rgba(200,170,255,0.65)';
  ctx.fillText('Jump & Double Jump to dodge Dogs 🐕, Rocks 🪨, and Birds 🐦', W/2, 320);
  ctx.fillText('Collect Fish 🐟 (+10pts) • Stars ⭐ (+50pts) • Hearts ❤️ (+Life)', W/2, 342);

  if (highScore > 0) {
    ctx.font = "20px 'Fredoka One', cursive";
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = 'rgba(255,215,0,0.8)'; ctx.shadowBlur = 12;
    ctx.fillText('🏆  High Score: ' + highScore, W/2, 378);
    ctx.shadowBlur = 0;
  }
  ctx.textAlign = 'left';
}

function drawOver() {
  ctx.fillStyle = 'rgba(8,0,22,0.88)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';

  ctx.font = "bold 60px 'Fredoka One', cursive";
  ctx.fillStyle = '#FF3C7A';
  ctx.shadowColor = 'rgba(255,60,120,0.9)'; ctx.shadowBlur = 26;
  ctx.fillText('GAME OVER', W/2, 118);
  ctx.shadowBlur = 0;

  ctx.font = "34px 'Fredoka One', cursive";
  ctx.fillStyle = 'white';
  ctx.fillText('Score: ' + G.score, W/2, 178);

  if (G.score >= highScore && G.score > 0) {
    const h = (G.tick * 4) % 360;
    ctx.font = "26px 'Fredoka One', cursive";
    ctx.fillStyle = `hsl(${h},100%,72%)`;
    ctx.shadowColor = `hsl(${h},100%,52%)`; ctx.shadowBlur = 18;
    ctx.fillText('🎊  NEW HIGH SCORE!  🎊', W/2, 220);
    ctx.shadowBlur = 0;
  } else {
    ctx.font = "21px 'Fredoka One', cursive";
    ctx.fillStyle = '#C9B8FF';
    ctx.fillText('Best: ' + highScore, W/2, 220);
  }

  const p = 0.6 + 0.4*Math.sin(G.tick * 0.07);
  ctx.save(); ctx.globalAlpha = p;
  ctx.font = "30px 'Fredoka One', cursive";
  ctx.fillStyle = '#FFB5C8';
  ctx.shadowColor = '#FF6090'; ctx.shadowBlur = 20;
  ctx.fillText('✦  TAP / SPACE TO PLAY AGAIN  ✦', W/2, 293);
  ctx.shadowBlur = 0; ctx.restore();

  ctx.textAlign = 'left';
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
initGame();

function loop() {
  G.tick++;
  ctx.clearRect(0,0,W,H);

  const doShake = G.shake > 0;
  if (doShake) {
    ctx.save();
    ctx.translate((Math.random()-.5)*G.shake*.5, (Math.random()-.5)*G.shake*.22);
    G.shake -= 1.8;
  }

  const bgSpd = (G.state==='playing'||G.state==='dead') ? G.speed : 1.4;
  drawBG(G.tick, bgSpd);

  if (G.state === 'playing' || G.state === 'dead') {
    if (G.state === 'playing') {
      // Speed ramp
      G.speed = Math.min(14, 4.6 + G.score * 0.0068);

      // Animation frame
      if (G.tick % 5 === 0) G.frame++;

      // Physics
      const c = G.cat;
      c.vy += 0.58;
      c.y  += c.vy;
      if (c.y >= CAT_FLOOR) { c.y=CAT_FLOOR; c.vy=0; c.jumps=0; c.state='run'; }
      if (c.inv > 0) c.inv--;

      // Move objects
      G.obstacles.forEach(o => o.x -= G.speed);
      G.obstacles = G.obstacles.filter(o => o.x > -130);
      G.cols.forEach(col => col.x -= G.speed * 0.86);
      G.cols = G.cols.filter(col => col.x > -65);

      // Spawn
      G.nextObs--;
      if (G.nextObs <= 0) {
        spawnObs();
        G.nextObs = Math.max(55, 125 - G.score*0.1) + Math.random()*65;
      }
      G.nextCol--;
      if (G.nextCol <= 0) {
        spawnCol();
        G.nextCol = 48 + Math.random()*55;
      }

      G.score++;
      checkCollisions();
      checkPickups();
    }

    // Draw collectibles
    G.cols.forEach(col => {
      if      (col.type==='fish')  drawFish(col.x, col.y, G.tick);
      else if (col.type==='star')  drawStar(col.x, col.y, G.tick);
      else                         drawHeart(col.x, col.y, G.tick);
    });

    // Draw obstacles
    G.obstacles.forEach(obs => {
      if      (obs.type==='dog')  drawDog(obs.x, obs.y, G.tick);
      else if (obs.type==='rock') drawRock(obs.x, obs.y);
      else                        drawBird(obs.x, obs.y, G.tick);
    });

    // Draw cat
    drawCat(CAT_X, G.cat.y, G.cat.state, G.frame, G.cat.inv, G.tick);

    // Effects + UI
    updatePFX(); drawPFX();
    updateFloats(); drawFloats();
    drawUI();
  }

  if (doShake) ctx.restore();

  // Overlay menu/gameover draws BG fresh on top
  if (G.state === 'menu') {
    drawBG(G.tick, 1.5);
    if (G.tick % 5 === 0) G.frame++;
    drawCat(W/2-20, CAT_FLOOR, 'run', G.frame, 0, G.tick);
    drawMenu();
  } else if (G.state === 'over') {
    drawOver();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
