<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>TubeOS — Creator Command Center</title>
    <meta name="description" content="AI-powered YouTube creator management platform. Upload, schedule, analyze, and automate your channel growth." />
    <meta name="theme-color" content="#06060A" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- PWA manifest (VitePWA injects this automatically in build; kept for dev) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS / Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TubeOS" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Safe-area insets for iPhone notch / Dynamic Island -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TubeOS — Creator Command Center" />
    <meta property="og:description" content="AI-powered YouTube creator management platform." />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TubeOS" />
    <meta name="twitter:description" content="AI-powered YouTube creator management platform." />
    <meta name="twitter:image" content="/pwa-512x512.png" />

    <!-- Google Fonts: Syne + DM Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        /* Respect iOS safe areas */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      body {
        background: #06060a;
        color: #f9fafb;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent rubber-band overscroll showing white on iOS */
        overscroll-behavior: none;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a12;
      }
      ::-webkit-scrollbar-thumb {
        background: #22223d;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
